<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
      color:white;
      text-align:center;
      overflow:hidden;
    }

    .container{
      max-width:600px;
      padding:20px;
    }

    h1{
      font-size:120px;
      color:#38bdf8;
      margin-bottom:10px;
      animation:float 2s infinite ease-in-out;
    }

    h2{
      font-size:35px;
      margin-bottom:15px;
    }

    p{
      color:#cbd5e1;
      margin-bottom:30px;
      line-height:1.6;
    }

    .btn{
      display:inline-block;
      padding:12px 25px;
      background:#38bdf8;
      color:white;
      text-decoration:none;
      border-radius:8px;
      transition:0.3s;
    }

    .btn:hover{
      background:#0ea5e9;
      transform:translateY(-5px);
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-10px);
      }
      100%{
        transform:translateY(0px);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>404</h1>

    <h2>Oops! Page Not Found</h2>

    <p>
      The page you are looking for might have been removed,
      renamed, or is temporarily unavailable.
    </p>

    <a href="index.html" class="btn">
      Go Back Home
    </a>
  </div>

</body>
</html>
